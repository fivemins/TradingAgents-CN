            - heading "002595.SZ Technical Analysis Report (As of 2026-03-24)" [level=1] [ref=e80]
            - heading "Overview" [level=2] [ref=e81]
            - paragraph [ref=e82]: "Over the past 12 months (March 2025 to March 2026), 002595.SZ has delivered strong bullish performance, with price rallying from ~57 to a peak of 101.5 in early March 2026. The stock has recently experienced a sharp 17.6% pullback from its peak, creating an interesting mixed setup of long-term strength and short-term weakness. Below is a detailed analysis of key indicators:"
            - separator [ref=e83]
            - heading "Detailed Indicator Analysis" [level=2] [ref=e84]
            - heading "1. Long-Term Trend (200 SMA)" [level=3] [ref=e85]
            - paragraph [ref=e86]:
              - text: The 200-day simple moving average (a long-term trend benchmark) currently stands at
              - strong [ref=e87]: "69.87"
              - text: ", with the latest closing price at 83.56 (19.5% above the 200 SMA). The 200 SMA has been consistently sloping upward over the past 8 months, rising from 52.4 in July 2025 to its current level. This confirms that the primary long-term uptrend remains fully intact, with no signs of a trend reversal at this stage."
            - heading "2. Short-Term Trend (10 EMA)" [level=3] [ref=e88]
            - paragraph [ref=e89]:
              - text: The 10-day exponential moving average (a responsive short-term momentum indicator) currently stands at
              - strong [ref=e90]: "88.71"
              - text: ", which is ~6.1% above the latest closing price. The 10 EMA has been falling steadily from its peak of 95.5 on March 6, 2026, confirming that the short-term trend is bearish, and the pullback remains active in the near term."
            - heading "3. Momentum (RSI)" [level=3] [ref=e91]
            - paragraph [ref=e92]:
              - text: The 14-day Relative Strength Index currently reads
              - strong [ref=e93]: "35.6"
              - text: ", which is just above the 30 threshold commonly used to identify oversold conditions. During the strong 2025 October–2026 February uptrend, RSI remained consistently above 50 and often above 70, which aligns with the dynamic of strong trends where RSI can stay overbought for extended periods. The current drop to 35.6 indicates that downward momentum is nearing exhaustion, but has not yet reached extreme oversold levels that guarantee an immediate reversal."
            - heading "4. Volatility & Mean Reversion (Bollinger Bands)" [level=3] [ref=e94]
            - list [ref=e95]:
              - listitem [ref=e96]:
                - text: "Latest Bollinger Lower Band:"
                - strong [ref=e97]: "84.35"
              - listitem [ref=e98]:
                - text: "Latest Bollinger Upper Band:"
                - strong [ref=e99]: "100.85"
            - paragraph [ref=e100]: The current price of 83.56 is slightly below the lower Bollinger Band, which is a classic signal that the stock is oversold in the short term based on recent volatility. This increases the probability of a mean reversion bounce back toward the middle band (around 92.6). During the recent uptrend, price consistently rode the upper Bollinger Band (a sign of sustained bullish momentum), so the current move below the lower band is an extreme short-term move that is likely to reverse.
            - heading "5. Risk Management (ATR)" [level=3] [ref=e101]
            - paragraph [ref=e102]:
              - text: The Average True Ratio (a volatility measure) currently stands at
              - strong [ref=e103]: "3.55"
              - text: ", which is more than double the 1.1–1.7 range seen in mid-2025. This confirms that volatility has increased substantially during and after the strong uptrend. Traders should adjust for this higher volatility by reducing position sizes and using wider stop-loss levels: for a long entry at current prices (~83.5), a stop-loss between 80 (1x ATR) and 73 (3x ATR, near the 200 SMA long-term support) is appropriate."
